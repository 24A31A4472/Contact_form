<!DOCTYPE html>
<html>
<head>
  <title>Advanced Contact Form</title>

  <style>
  body {
  font-family: Arial;
  background: linear-gradient(to right, #74ebd5, #ACB6E5);
  margin: 0;

  display: flex;
  justify-content: center;   /* horizontal center */
  align-items: center;       /* vertical center */
  height: 100vh;             /* full screen height */
}

    .container {
      width: 100%;
      max-width: 400px;
    
      padding: 20px;
      background: white;
      border-radius: 12px;
      box-shadow: 0 0 15px rgba(0,0,0,0.2);
    }

    h2 { text-align: center; }

    input, textarea, select {
      width: 100%;
      padding: 10px;
      margin: 6px 0;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    .phone-group {
      display: flex;
      gap: 5px;
    }

    .phone-group select { width: 35%; }
    .phone-group input { width: 65%; }

    button {
      width: 100%;
      padding: 10px;
      background: #4CAF50;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
    }

    button:disabled {
      background: gray;
      cursor: not-allowed;
    }

    .error {
      color: red;
      font-size: 12px;
    }

    /* Popup */
    .popup {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.5);
      justify-content: center;
      align-items: center;
    }

    .popup-content {
      background: white;
      padding: 20px;
      border-radius: 10px;
      text-align: center;
    }

    /* Responsive */
    @media(max-width: 500px) {
      .container {
        width: 95%;
        margin: 20px auto;
        padding: 15px;
      }

      .phone-group {
        flex-direction: column;
      }

      .phone-group select,
      .phone-group input {
        width: 100%;
      }
    }
    
  </style>
</head>

<body>

<div class="container">
  <h2>Contact Form</h2>

  <input type="text" id="name" placeholder="Name">
  <div class="error" id="nameError"></div>

  <input type="email" id="email" placeholder="Email">
  <div class="error" id="emailError"></div>

  <div class="phone-group">
    <select id="countryCode">
      <option value="+91">🇮🇳 +91</option>
      <option value="+1">🇺🇸 +1</option>
      <option value="+44">🇬🇧 +44</option>
    </select>
    <input type="text" id="phone" placeholder="Phone">
  </div>
  <div class="error" id="phoneError"></div>

  <textarea id="message" placeholder="Message"></textarea>
  <div class="error" id="messageError"></div>

  <button id="submitBtn" disabled onclick="submitForm()">Submit</button>
</div>

<!-- Popup -->
<div class="popup" id="popup">
  <div class="popup-content">
    <h3>✅ Submitted Successfully!</h3>
    <p id="finalData"></p>
    <button onclick="closePopup()">Close</button>
  </div>
</div>


<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
<script>
    emailjs.init("72KejNYvzbI4WJrK_");
let inputs = ["name", "email", "phone", "message"];

inputs.forEach(id => {
  document.getElementById(id).addEventListener("input", validateForm);
});

function validateForm() {
  let valid = true;

  let name = nameInput("name", "nameError");
  let email = emailInput("email", "emailError");
  let phone = phoneInput("phone", "phoneError");
  let message = nameInput("message", "messageError");

  if (!name || !email || !phone || !message) valid = false;

  document.getElementById("submitBtn").disabled = !valid;
}

function nameInput(id, errorId) {
  let val = document.getElementById(id).value.trim();
  let error = document.getElementById(errorId);

  if (val === "") {
    error.innerHTML = "Required";
    return false;
  } else {
    error.innerHTML = "";
    return true;
  }
}

function emailInput(id, errorId) {
  let val = document.getElementById(id).value;
  let error = document.getElementById(errorId);

  let pattern = /^[^ ]+@[^ ]+\.[a-z]{2,3}$/;

  // ❌ Check for uppercase letters
  if (val !== val.toLowerCase()) {
    error.innerHTML = "Email must be in lowercase only";
    return false;
  }

  // ❌ Check valid format
  if (!val.match(pattern)) {
    error.innerHTML = "Invalid email format";
    return false;
  }

  // ✅ Valid
  error.innerHTML = "";
  return true;
}

function phoneInput(id, errorId) {
  let val = document.getElementById(id).value;
  let error = document.getElementById(errorId);
  let pattern = /^[0-9]{10}$/;

  if (!val.match(pattern)) {
    error.innerHTML = "10 digits only";
    return false;
  } else {
    error.innerHTML = "";
    return true;
  }
}

function submitForm() {
  let btn = document.getElementById("submitBtn");
  btn.innerText = "Sending...";
  btn.disabled = true;

  let name = document.getElementById("name").value;
  let email = document.getElementById("email").value;
  let phone = document.getElementById("phone").value;
  let code = document.getElementById("countryCode").value;
  let message = document.getElementById("message").value;

  let fullPhone = code + " " + phone;

  emailjs.send("service_g3v75pq", "template_ococizo", {
    from_name: name,
    from_email: email,
    phone: fullPhone,
    message: message
  })
  .then(function() {
    document.getElementById("finalData").innerHTML =
      "✅ Message sent to admin!";

    document.getElementById("popup").style.display = "flex";

    btn.innerText = "Submit";

    document.querySelectorAll("input, textarea").forEach(i => i.value = "");
  })
.catch(function(error) {
  console.log("ERROR:", error);  
  alert("❌ Failed to send email");
});
}

function closePopup() {
  document.getElementById("popup").style.display = "none";
}
</script>

</body>
</html>
